# nginx server for the LexDraft SPA.
#
# Three jobs:
#   1. Serve the React Router SPA - deep links must fall back to /index.html
#      so the client-side router can pick up the URL.
#   2. Set cache-control correctly - long, immutable cache for hashed asset
#      filenames (`/assets/*.[hash].js`), short cache for `index.html` so a
#      new deploy is picked up on the next refresh.
#   3. Apply baseline security headers. TLS termination + HSTS lives at the
#      reverse proxy (Caddy/Traefik/nginx-ingress); this server stays HTTP.

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    # Resolve under /usr/share/nginx/html (where the build stage copies dist).
    root   /usr/share/nginx/html;
    index  index.html;

    # Tighter limits - the SPA only fetches its own bundle. Large bodies
    # belong to the API.
    client_max_body_size 1m;
    server_tokens off;

    # Gzip on for text-ish responses. brotli would be nicer but isn't in
    # the stock nginx:alpine; if the operator swaps the base image to one
    # with the brotli module they can layer it on.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # Security headers - kept conservative and route-agnostic. CSP is
    # intentionally NOT set here; the SPA + API combination needs a real
    # policy and that's wired at the edge proxy where the API origin is
    # also known.
    add_header X-Content-Type-Options       "nosniff"                              always;
    add_header X-Frame-Options              "DENY"                                 always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;

    # ES-module assets (e.g. the pdf.js worker `pdf.worker.min.mjs`, loaded by
    # Contract Review's client-side PDF text extraction) MUST be served with a
    # JavaScript content type. nginx's stock mime.types has no `.mjs` mapping,
    # so without this they fall back to application/octet-stream — and because
    # `X-Content-Type-Options: nosniff` is set (here and at the Caddy edge), the
    # browser refuses to execute the module worker, so PDF uploads silently fail
    # to load. Empty `types {}` clears the inherited table for this block so
    # `default_type` applies to every match (only `.mjs` files reach here).
    # Must precede the broader assets location below — first regex match wins.
    location ~* ^/assets/.+\.mjs$ {
        types { }
        default_type text/javascript;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Hashed assets get a year of immutable cache. Vite emits filenames
    # like `assets/index-DhJ8t6Ke.js` - the hash is the cache-buster.
    location ~* ^/assets/.+\.(?:js|mjs|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico|map)$ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Anything else under known static suffixes - still cacheable, but
    # without `immutable` so an unhashed image (favicon, /logo.png) can be
    # replaced without a query-string bust.
    location ~* \.(?:woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
        access_log off;
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # index.html and the SPA fallback. Never cache the entry document -
    # otherwise a freshly-deployed bundle never reaches a returning user.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        expires off;
    }

    # SPA fallback: anything that isn't a real file falls through to
    # index.html so React Router's history mode works for deep links.
    # /api/* requests should NOT hit this server in production - the
    # reverse proxy routes /api to the api container directly.
    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # Tiny health endpoint for docker HEALTHCHECK + reverse-proxy probes.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
